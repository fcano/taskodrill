{# Task timer widget; expects: task, timer_session_state (optional) #}
<div class="task-timer-cell text-nowrap"
    data-task-id="{{ task.id }}"
    data-folder-id="{% if task.folder_id %}{{ task.folder_id }}{% endif %}"
    data-timer-accumulated="{% if timer_session_state %}{{ timer_session_state.accumulated_seconds }}{% else %}0{% endif %}"
    {% if timer_session_state and timer_session_state.segment_started_at %}data-timer-segment-start="{{ timer_session_state.segment_started_at.isoformat }}"{% endif %}>
  <div class="task-timer-session small text-muted mb-1">Session: <span class="task-timer-display">0:00</span></div>
  <div class="task-timer-total small">Logged: <span class="task-timer-total-value" data-seconds="{{ task.tracked_time_seconds|default:0 }}"></span></div>
  <div class="btn-group btn-group-sm mt-1" role="group">
    <button type="button" class="btn btn-outline-success task-timer-play" title="Play">▶</button>
    <button type="button" class="btn btn-outline-secondary task-timer-pause" disabled title="Pause">⏸</button>
    <button type="button" class="btn btn-outline-danger task-timer-stop" disabled title="Stop">■</button>
  </div>
</div>
